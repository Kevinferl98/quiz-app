services:
  # --- INFRASTRUCTURE ---
  postgres:
    image: postgres:18.2-alpine3.22
    container_name: keycloak_db
    environment:
      POSTGRES_DB: keycloak 
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:8.4.0-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - backend_net

  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_net

  # --- IDENTITY PROVIDER ---
  keycloak:
    image: keycloak/keycloak:26.5
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /identity
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/quiz-realm.json:/opt/keycloak/data/import/quiz-realm.json:ro
      - ./keycloak/themes/modern-quiz:/opt/keycloak/themes/modern-quiz:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=PathPrefix(`/identity`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    depends_on:
      postgres: 
        condition: service_healthy
    networks:
      - backend_net

  # --- BACKEND SERVICES ---
  quiz-service:
    build: ./backend/quiz_service
    container_name: quiz_service
    ports:
      - "8001:8001"
      - "50051:50051"
    environment:
      IS_LOCAL: "true"
      KEYCLOAK_URL: http://keycloak:8080/identity
      KEYCLOAK_REALM: quiz
      KEYCLOAK_CLIENT_ID: account
      KEYCLOAK_ISSUER: http://localhost/identity/realms
      MONGO_URI: "mongodb://mongo:27017"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quiz.rule=PathPrefix(`/api/quizzes`)"
      - "traefik.http.services.quiz.loadbalancer.server.port=8001"
      - "traefik.http.middlewares.quiz-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.quiz.middlewares=quiz-strip"
    depends_on:
      mongo: 
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend_net

  game-service:
    build: ./backend/game_service
    environment:
      IS_LOCAL: "true"
      KEYCLOAK_URL: http://keycloak:8080/identity
      KEYCLOAK_REALM: quiz
      KEYCLOAK_CLIENT_ID: account
      KEYCLOAK_ISSUER: http://localhost/identity/realms
    depends_on:
      redis: 
        condition: service_healthy
      keycloak:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.game.rule=PathPrefix(`/api/game`) || PathPrefix(`/ws`)"
      - "traefik.http.middlewares.game-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.game.middlewares=game-strip"
      - "traefik.http.services.game.loadbalancer.server.port=8002"
    networks:
      - backend_net
    deploy:
      replicas: 3

  # --- FRONTEND ---
  frontend:
    build: ./frontend
    container_name: frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
    networks:
      - backend_net

  # --- API GATEWAY ---
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8085:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - backend_net
    
networks:
  backend_net:
    driver: bridge

volumes:
  redis_data:
  keycloak_db_data:
  mongo_data: